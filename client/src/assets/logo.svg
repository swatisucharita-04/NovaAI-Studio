<svg width="420" height="120" viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5eead4;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1"></stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon -->
  <g transform="translate(20,20)">
    <circle cx="40" cy="40" r="28" fill="none" stroke="url(#grad)" stroke-width="4"></circle>
    <polygon points="40,18 45,35 62,40 45,45 40,62 35,45 18,40 35,35" fill="url(#grad)" filter="url(#glow)"></polygon>
  </g>

  <!-- Text -->
  <text x="120" y="70" font-family="Inter, Segoe UI, Arial" font-size="42" font-weight="700" fill="#0f172a">
    Nova
    <tspan fill="url(#grad)">AI</tspan>
    <tspan font-weight="400" fill="#64748b" font-size="26"> Studio</tspan>
  </text>
</svg>